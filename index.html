<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Amira</title>
    <style>
        :root { --pink-light: #ffc1d6; --pink-dark: #ff85a2; --bg-color: #fff5f7; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; color: #444; }
        .container { text-align: center; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 450px; position: relative; z-index: 10; }
        .page { display: none; animation: fadeIn 0.5s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h2 { color: var(--pink-dark); margin-bottom: 20px; font-size: 22px; line-height: 1.5; }
        input[type="password"] { padding: 12px; border: 2px solid var(--pink-light); border-radius: 10px; text-align: center; font-size: 18px; width: 80%; outline: none; margin-bottom: 15px; }
        button { background-color: var(--pink-light); border: none; padding: 12px 20px; margin: 10px; border-radius: 15px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; animation: shake 3s infinite ease-in-out; }
        button:active { transform: scale(0.9); box-shadow: inset 0 3px 5px rgba(0,0,0,0.1); }
        button.hidden-btn { display: none; } /* زرار مخفي في البداية */
        @keyframes shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(1deg); } 75% { transform: rotate(-1deg); } }
        #noBtn { position: absolute; z-index: 999; }
        .balloon, .heart { position: fixed; bottom: -100px; animation: float 5s linear forwards; pointer-events: none; }
        @keyframes float { to { transform: translateY(-120vh) rotate(360deg); } }
        .typewriter-text { font-size: 18px; line-height: 1.8; color: #555; text-align: right; direction: rtl; white-space: pre-wrap; }
        .poem-box { background: #fff0f3; padding: 15px; border-radius: 15px; margin: 15px 0; border-right: 4px solid var(--pink-dark); font-size: 15px; line-height: 1.6; min-height: 100px; text-align: right; }
    </style>
</head>
<body>

    <div id="page0" class="page active">
        <div class="container">
            <h2>ادخلي كلمة السر يـ أميرة 🤫</h2>
            <input type="password" id="passInput" placeholder="••••••">
            <br>
            <button onclick="checkPass()">دخول</button>
        </div>
    </div>

    <div id="page1" class="page">
        <div class="container">
            <h2>هسالك سؤال صغنون 🙃</h2>
            <button onclick="nextPage(2)">اسال ي حبيبي 🥹</button>
            <button onclick="nextPage(2)">اسال ي قلبي 🥹</button>
        </div>
    </div>

    <div id="page2" class="page">
        <div class="container">
            <h2>بتحبيني ي أميرة 🫣</h2>
            <button onclick="nextPage(3)">🤭</button>
        </div>
    </div>

    <div id="page3" class="page">
        <div class="container">
            <h2>شكلك مش بتحبيني 😔</h2>
            <button onclick="nextPage(4)">متقولش كده بس 🙈</button>
        </div>
    </div>

    <div id="page4" class="page" style="min-height: 200px;">
        <div class="container">
            <h2>يعني بتحبيني ولا لأ 🥺</h2>
            <button onclick="nextPage(5)">بحبك ي ميدو 😭🩷</button>
            <button id="noBtn" onmouseover="moveNoBtn()" onclick="betrayal()">لأ</button>
        </div>
    </div>

    <div id="page5" class="page">
        <div class="container">
            <h2 style="font-size: 24px;">🎉💞🥹 <br>𝑯𝒂𝒑𝒑𝒚 𝒃𝒊𝒓𝒕𝒉𝒅𝒂𝒚 𝑨𝒎𝒊𝒓𝒂</h2>
            <div id="poemTypewriter" class="poem-box typewriter-text"></div>
            <button id="poemFinalBtn" class="hidden-btn" onclick="nextPage(6)">وانت طيب ي روح قلبي وان شاء الله نفضل سوا طول عمرنا 🤭💗</button>
        </div>
    </div>

    <div id="page6" class="page">
        <div class="container">
            <div id="typewriter" class="typewriter-text"></div>
        </div>
    </div>

    <script>
        function nextPage(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
            if(num === 5) { startParty(); startPoemTypewriter(); }
            if(num === 6) { startTypewriter(); }
        }

        function checkPass() {
            if(document.getElementById('passInput').value === "692009") nextPage(1);
            else alert("الرقم السري غلط ي أميرة! ركزي 🧐");
        }

        function moveNoBtn() {
            const btn = document.getElementById('noBtn');
            const maxX = window.innerWidth - btn.clientWidth - 20;
            const maxY = window.innerHeight - btn.clientHeight - 20;
            btn.style.position = 'fixed';
            btn.style.left = Math.random() * maxX + 'px';
            btn.style.top = Math.random() * maxY + 'px';
        }

        function betrayal() {
            alert("انتي مش كيوت وغدرتي بيا 😭");
            window.location.reload();
        }

        function startParty() {
            setInterval(() => {
                const item = document.createElement('div');
                item.className = Math.random() > 0.5 ? 'balloon' : 'heart';
                item.innerHTML = item.className === 'balloon' ? '🎈' : '❤️';
                item.style.left = Math.random() * 100 + 'vw';
                item.style.fontSize = (Math.random() * 40 + 30) + 'px';
                document.body.appendChild(item);
                setTimeout(() => item.remove(), 5000);
            }, 150);
        }

        function startPoemTypewriter() {
            const poemText = "ڪـل ســنــة وإنـتـي طـيـبـة ي أحــلـى مـــن يــتـم 16 ســنــة ودا اولــــ عــيـد مــيـلاد لــيـكـي واحــنـا مــع بــعـض وتــانـي عــيـد مــيـلاد لــيـكـي مـــن مــعـرفـتـنا لبــعـض. 🥹🙈💜\n\nبــتـمـنـالـك مـــن ڪـل قــلـبـي إنــ الــسـنـة دي تــكـون ســنــة جـديـدة وســعـيـدة عـلـيـكـي وتــكـونـي مــوفـقـة فــيـه‍ا دايــمـا يا رب.. انــا عـارف إنــ الـســنــة دي هـتـكـون غــيـر أي ســنــة فـاتـت لإنـنـا هـنـكـون فـي ثـانـويـة وانــا عـارفــ ومُـتـيـقـن انــڪ قــدهـا وقـدود وربـنـا و انــك إن شـاء الله هـتـفـرحـيـنـي انــا قـبـل نــفـسـك وهــتـحـقـقـي حــلـمـنـا إن شـاء الله 🥹💞\n\nو آخــر كــلامـي أن اكــون مُـخـلـص لـدعـواتـي لــكـي بـالـسـداد والـتـوفـيـق والـسـعـي الـدائـم واسـتـذاقـة لـذة الـوصـول فـي ڪـل مـا نـنتـمـنـاه اللهم آمـيـن 🤲🏻🤍";
            let i = 0;
            const element = document.getElementById('poemTypewriter');
            const btn = document.getElementById('poemFinalBtn');
            function type() {
                if (i < poemText.length) {
                    element.innerHTML += poemText.charAt(i);
                    i++;
                    setTimeout(type, 50); // سرعة الكتابة للقصيدة
                } else {
                    btn.style.display = 'inline-block'; // إظهار الزرار بعد انتهاء الكتابة
                }
            }
            type();
        }

        function startTypewriter() {
            const text = "كل حب منحته لكي هو حقكي للابد لن اطلبه يوما ولن اندم عليه ولن اعتبره هباءا فالحب لم يكن يوما صفقة بل كان هدية قدمتها لكي اتمنى انه في ساعات صمت حين يثقل العالم على روحكي تتذكري ان هناك من نظر إليك يوما وراي شيئا يستحق التمسك به وان شعرتي يوما بدفئ لا تعرفي مصدره خفيف عابر كذكرى فلعل ذلك أنا في مكان ما من الزمن ما زلت أفي بوعدي لكي..";
            let i = 0;
            const element = document.getElementById('typewriter');
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 70); // سرعة الكتابة للكلام الرومانسي
                }
            }
            type();
        }
    </script>
</body>
</html>
