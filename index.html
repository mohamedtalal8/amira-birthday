<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Amira</title>
    <style>
        :root { 
            --pink-light: #ffc1d6; 
            --pink-dark: #ff85a2; 
            --bg-color: #0b0b0b; /* خلفية سوداء فخمة */
        }
        
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
            color: white; 
        }

        /* حاوية الصفحة */
        .container { 
            text-align: center; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            padding: 35px; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(255, 133, 162, 0.2); 
            width: 90%; 
            max-width: 450px; 
            position: relative; 
            z-index: 10; 
            border: 1px solid rgba(255, 133, 162, 0.3);
        }

        .page { display: none; animation: fadeIn 0.4s ease-out; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; scale: 0.9; } to { opacity: 1; scale: 1; } }

        h2 { color: var(--pink-light); margin-bottom: 25px; font-size: 24px; text-shadow: 2px 2px 10px rgba(255,133,162,0.5); }

        input[type="password"] { 
            padding: 15px; 
            border: 2px solid var(--pink-dark); 
            border-radius: 15px; 
            text-align: center; 
            font-size: 20px; 
            width: 85%; 
            outline: none; 
            background: rgba(0,0,0,0.5);
            color: white;
            margin-bottom: 20px;
        }

        /* الزراير بحركة سريعة */
        button { 
            background-color: var(--pink-dark); 
            color: white;
            border: none; 
            padding: 14px 25px; 
            margin: 10px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-size: 17px; 
            font-weight: bold; 
            transition: 0.2s; 
            animation: fastShake 1.5s infinite ease-in-out; /* تسريع الحركة */
            box-shadow: 0 5px 15px rgba(255, 133, 162, 0.4);
        }

        button:active { transform: scale(0.85); background-color: #ff4d79; }

        @keyframes fastShake { 
            0%, 100% { transform: translateY(0) rotate(0); } 
            25% { transform: translateY(-3px) rotate(2deg); } 
            75% { transform: translateY(3px) rotate(-2deg); } 
        }

        /* زرار "لأ" المجنون */
        #noBtn { position: fixed; z-index: 999; animation: crazyMove 4s infinite alternate ease-in-out; }
        
        @keyframes crazyMove {
            0% { transform: translate(0, 0); }
            50% { transform: translate(50px, -30px); }
            100% { transform: translate(-40px, 40px); }
        }

        /* البلالين والقلوب في كل مكان */
        .floating { position: fixed; bottom: -100px; animation: floatUp 6s linear forwards; pointer-events: none; z-index: 1; }
        @keyframes floatUp { to { transform: translateY(-120vh) rotate(360deg); } }

        .poem-box, .typewriter-text { 
            font-size: 18px; 
            line-height: 1.8; 
            color: #eee; 
            text-align: right; 
            white-space: pre-wrap;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 20px;
        }

        #poemFinalBtn { display: none; margin-top: 20px; }
    </style>
</head>
<body onload="startGlobalParty()">

    <div id="page0" class="page active">
        <div class="container">
            <h2>حطي كلمة السر ي قلبي 🥹🥰</h2>
            <input type="password" id="passInput" placeholder="••••••">
            <br>
            <button onclick="checkPass()">حطيت 🙂</button>
        </div>
    </div>

    <div id="page1" class="page">
        <div class="container">
            <h2>هسالك سؤال صغنون 🙃</h2>
            <button onclick="nextPage(2)">اسال ي حبيبي 🥹</button>
            <button onclick="nextPage(2)">اسال ي قلبي 🥹</button>
        </div>
    </div>

    <div id="page2" class="page">
        <div class="container">
            <h2>بتحبيني ي أميرة 🫣</h2>
            <button onclick="nextPage(3)">🤭</button>
        </div>
    </div>

    <div id="page3" class="page">
        <div class="container">
            <h2>شكلك مش بتحبيني 😔</h2>
            <button onclick="nextPage(4)">متقولش كده بس 🙈</button>
        </div>
    </div>

    <div id="page4" class="page">
        <div class="container" style="min-height: 250px;">
            <h2>يعني بتحبيني ولا لأ 🥺</h2>
            <button onclick="nextPage(5)">بحبك ي ميدو 😭🩷</button>
            <button id="noBtn" onmouseover="teleportBtn()" onclick="betrayal()">لأ</button>
        </div>
    </div>

    <div id="page5" class="page">
        <div class="container">
            <h2 style="font-size: 26px;">🎉💞🥹 <br>𝑯𝒂𝒑𝒑𝒚 𝒃𝒊𝒓𝒕𝒉𝒅𝒂𝒚 𝑨𝒎𝒊𝒓𝒂</h2>
            <div id="poemText" class="poem-box"></div>
            <button id="poemFinalBtn" onclick="nextPage(6)">وانت طيب ي روح قلبي وان شاء الله نفضل سوا طول عمرنا 🤭💗</button>
        </div>
    </div>

    <div id="page6" class="page">
        <div class="container">
            <div id="finalText" class="typewriter-text"></div>
        </div>
    </div>

    <script>
        function nextPage(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
            if(num === 5) startPoem();
            if(num === 6) startFinalText();
        }

        function checkPass() {
            if(document.getElementById('passInput').value === "692009") nextPage(1);
            else alert("الرقم السري غلط ي أميرة! ركزي 🧐");
        }

        // زرار "لأ" بيتحرك لما تقرب منه وبشكل عشوائي
        function teleportBtn() {
            const btn = document.getElementById('noBtn');
            btn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            btn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
        }

        function betrayal() {
            alert("انتي مش كيوت وغدرتي بيا 😭");
            window.location.reload();
        }

        // حفلة مستمرة في كل الصفحات
        function startGlobalParty() {
            setInterval(() => {
                const el = document.createElement('div');
                el.className = 'floating';
                el.innerHTML = Math.random() > 0.5 ? '🎈' : '❤️';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.fontSize = (Math.random() * 30 + 20) + 'px';
                el.style.opacity = Math.random();
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 6000);
            }, 300);
        }

        function startPoem() {
            const text = "ڪـل ســنــة وإنـتـي طـيـبـة ي أحــلـى مـــن يــتـم 16 ســنــة ودا اولــــ عــيـد مــيـلاد لــيـكـي واحــنـا مــع بــعـض وتــانـي عــيـد مــيـلاد لــيـكـي مـــن مــعـرفـتـنا لبــعـض. 🥹🙈💜\n\nبــتـمـنـالـك مـــن ڪـل قــلـبـي إنــ الــسـنـة دي تــكـون ســنــة جـديـدة وســعـيـدة عـلـيـكـي وتــكـونـي مــوفـقـة فــيـه‍ا دايــمـا يا رب.. انــا عـارف إنــ الـســنــة دي هـتـكـون غــيـر أي ســنــة فـاتـت لإنـنـا هـنـكـون فـي ثـانـويـة وانــا عـارفــ ومُـتـيـقـن انــڪ قــدهـا وقـدود وربـنـا و انــك إن شـاء الله هـتـفـرحـيـنـي انــا قـبـل نــفـسـك وهــتـحـقـقـي حــلـمـنـا إن شـاء الله 🥹💞\n\nو آخــر كــلامـي أن اكــون مُـخـلـص لـدعـواتـي لــكـي بـالـسـداد والـتـوفـيـق والـسـعـي الـدائـم واسـتـذاقـة لـذة الـوصـول فـي ڪـل مـا نـتـمـنـاه اللهم آمـيـن 🤲🏻🤍";
            typeWrite('poemText', text, 40, () => {
                document.getElementById('poemFinalBtn').style.display = 'inline-block';
            });
        }

        function startFinalText() {
            const text = "كل حب منحته لكي هو حقكي للابد لن اطلبه يوما ولن اندم عليه ولن اعتبره هباءا فالحب لم يكن يوما صفقة بل كان هدية قدمتها لكي اتمنى انه في ساعات صمت حين يثقل العالم على روحكي تتذكري ان هناك من نظر إليك يوما وراي شيئا يستحق التمسك به وان شعرتي يوما بدفئ لا تعرفي مصدره خفيف عابر كذكرى فلعل ذلك أنا في مكان ما من الزمن ما زلت أفي بوعدي لكي..بحبك يا أميرة";
            typeWrite('finalText', text, 60);
        }

        function typeWrite(id, text, speed, callback) {
            let i = 0;
            const el = document.getElementById(id);
            function step() {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(step, speed);
                } else if (callback) callback();
            }
            step();
        }
    </script>
</body>
</html>
